<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff5b9b">
    <title>weDream ♥</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Falling sakura petals -->
<div id="sakura-container" aria-hidden="true"></div>

<!-- Setup screen -->
<div id="setup-screen" class="screen">
    <div class="card centered-card">
        <div class="lang-switcher centered">
            <button data-lang="en" class="lang-btn">EN</button>
            <button data-lang="ja" class="lang-btn">日本語</button>
        </div>
        <h1>weDream<span class="heart">♥</span></h1>
        <p class="tagline" data-i18n="tagline"></p>

        <label>
            <span data-i18n="setup_your_name"></span>
            <input type="text" id="setup-me" maxlength="20" autocomplete="off">
        </label>
        <p id="setup-error" class="form-error"></p>
        <button id="setup-start" class="btn-primary full-width" data-i18n="setup_start_btn"></button>
    </div>

    <section class="sample-dreams-section">
        <h2 data-i18n="sample_dreams_title"></h2>
        <div id="sample-dreams" class="sample-dreams"></div>
    </section>
</div>

<!-- Main app -->
<div id="app-screen" class="screen hidden">
    <header class="app-header">
        <div class="header-text">
            <h1>weDream<span class="heart">♥</span></h1>
            <p class="subtitle"><span id="name-me"></span> <span class="heart">♡</span></p>
        </div>
        <div class="header-actions">
            <div class="lang-switcher">
                <button data-lang="en" class="lang-btn">EN</button>
                <button data-lang="ja" class="lang-btn">日本語</button>
            </div>
            <button id="settings-btn" class="icon-btn" aria-label="Settings" title="Settings">⚙</button>
        </div>
    </header>

    <nav class="tabs" role="tablist">
        <button class="tab active" data-tab="all" role="tab" data-i18n="tab_all"></button>
        <button class="tab" data-tab="mine" role="tab" data-i18n="tab_mine"></button>
        <button class="tab" data-tab="theirs" role="tab" data-i18n="tab_theirs"></button>
        <button class="tab" data-tab="shared" role="tab" data-i18n="tab_shared"></button>
    </nav>

    <main id="dreams-list" class="dreams-list"></main>

    <button id="add-btn" class="fab" aria-label="Add dream">+</button>
</div>

<!-- Dream modal -->
<div id="dream-modal" class="modal hidden">
    <div class="modal-card">
        <h2 id="modal-title"></h2>
        <label>
            <span data-i18n="field_title"></span>
            <input type="text" id="dream-title" maxlength="80">
        </label>
        <label>
            <span data-i18n="field_details"></span>
            <textarea id="dream-details" maxlength="500"></textarea>
        </label>
        <label>
            <span data-i18n="field_category"></span>
            <select id="dream-category"></select>
        </label>
        <label>
            <span data-i18n="field_owner"></span>
            <select id="dream-owner">
                <option value="me" data-i18n="owner_mine"></option>
                <option value="partner" data-i18n="owner_theirs"></option>
                <option value="shared" data-i18n="owner_shared"></option>
            </select>
        </label>
        <div class="modal-actions">
            <button id="modal-cancel" class="btn-secondary" data-i18n="cancel"></button>
            <button id="modal-save" class="btn-primary" data-i18n="save"></button>
        </div>
    </div>
</div>

<script src="i18n.js"></script>
<script src="app.js"></script>

</body>
</html>
